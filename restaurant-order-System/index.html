<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurant Order System</title>

<link rel="stylesheet" href="public/css/styles.css">

</head>

<body>

<div class="container">

<h1> Restaurant Order System</h1>

<!-- MENU SECTION -->

<div class="menu-section">

<h2>Menu</h2>

<div id="menu" class="menu-grid"></div>

</div>


<!-- CURRENT ORDER -->

<div class="order-section">

<h2>Current Order</h2>

<ul id="orderPreview" class="order-preview"></ul>

</div>


<!-- ACTION BUTTONS -->

<div class="actions">

<button id="sendKitchen">Send Order</button>

<button id="getBill">Request Bill</button>

<button id="pay">Pay Order</button>

</div>


<!-- TOTAL BILL -->

<div class="bill-section">

<h2>Total</h2>

<div id="total" class="total-amount">$0</div>

</div>

</div>


<!-- TYPESCRIPT COMPILED JS -->

<script type="module" src="./public/js/main.js"></script>

</body>

</html>
