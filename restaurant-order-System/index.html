<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mavi's Restaurant</title>

<link rel="stylesheet" href="public/css/styles.css">

</head>

<body>

<header class="header">

<div class="logo">
Mavi's Restaurant
</div>

<div class="tagline">
Delicious food made simple
</div>

</header>


<main class="layout">

<!-- MENU -->

<section class="menu-section">

<h2>Our Menu</h2>

<div id="menu" class="menu-grid"></div>

</section>


<!-- ORDER PANEL -->

<aside class="order-panel">

<h2>Your Order</h2>

<ul id="orderPreview" class="order-list"></ul>

<div class="total-box">

<span>Total</span>
<h3 id="total">$0</h3>

</div>

<div class="actions">

<button id="sendKitchen" class="btn purple">
Send Order
</button>

<button id="getBill" class="btn gray">
Calculate Bill
</button>

<button id="pay" class="btn green">
Pay Order
</button>

</div>

</aside>

</main>

<script type="module" src="./public/js/main.js"></script>

</body>

</html>
